name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: invoice-management/package-lock.json

      - name: Install dependencies
        working-directory: invoice-management
        run: npm ci

      - name: Lint
        working-directory: invoice-management
        run: npm run lint

      - name: Test
        working-directory: invoice-management
        run: npm test -- --ci

      - name: Build
        working-directory: invoice-management
        run: npm run build

